<script>
  document.addEventListener('DOMContentLoaded', async function () {
    if (!window.__dreamMermaid) return

    var blocks = document.querySelectorAll('pre code.language-mermaid, pre code.lang-mermaid')
    if (!blocks.length) return

    blocks.forEach(function (block, index) {
      var pre = block.parentElement
      if (!pre || !pre.parentElement) return

      var wrapper = document.createElement('div')
      wrapper.className = 'mermaid'
      wrapper.textContent = block.textContent
      wrapper.setAttribute('data-mermaid-id', 'mermaid-' + index)
      pre.parentElement.replaceChild(wrapper, pre)
    })

    var isDark = localStore.getItem('hugo-theme-dream-is-dark')
    isDark = isDark ? isDark : window.defaultDark ? 'y' : isDark

    var themeVariables = isDark === 'y'
      ? {
          primaryColor: '#1f3a33',
          primaryTextColor: '#e9f7ef',
          primaryBorderColor: '#5aa37a',
          lineColor: '#86c59a',
          secondaryColor: '#27463f',
          tertiaryColor: '#1a2d29',
          background: '#1a2a27',
          mainBkg: '#1f3a33',
          secondBkg: '#27463f',
          tertiaryBkg: '#223a34',
          nodeBorder: '#5aa37a',
          clusterBkg: '#203631',
          clusterBorder: '#5aa37a',
          edgeLabelBackground: '#27463f',
          fontFamily: 'Segoe UI, Microsoft YaHei, sans-serif',
          fontSize: '15px'
        }
      : {
          primaryColor: '#e8f5ee',
          primaryTextColor: '#1d3b2f',
          primaryBorderColor: '#4f9b6b',
          lineColor: '#5d9f73',
          secondaryColor: '#f3fbf6',
          tertiaryColor: '#dff0e6',
          background: '#ffffff',
          mainBkg: '#e8f5ee',
          secondBkg: '#f3fbf6',
          tertiaryBkg: '#dff0e6',
          nodeBorder: '#4f9b6b',
          clusterBkg: '#f5fbf7',
          clusterBorder: '#7caf8c',
          edgeLabelBackground: '#ffffff',
          fontFamily: 'Segoe UI, Microsoft YaHei, sans-serif',
          fontSize: '15px'
        }

    window.__dreamMermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: themeVariables,
      securityLevel: 'loose',
      flowchart: { curve: 'basis', htmlLabels: true },
      sequence: { useMaxWidth: true, wrap: true },
      state: { useMaxWidth: true }
    })

    await window.__dreamMermaid.run({
      querySelector: '.mermaid'
    })
  })
</script>
